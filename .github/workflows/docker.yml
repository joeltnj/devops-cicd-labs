# ============================================================
# WORKFLOW DOCKER — Build + Push image sur Docker Hub
# Déclenché uniquement sur push main (pas sur les PRs)
# Analogie : l'usine emballe et expédie le produit fini
# ============================================================

name: Docker — Build & Push

# ── EVENT ────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'app.js'          # rebuild seulement si le code change
      - 'Dockerfile'      # ou si le Dockerfile change
      - 'package*.json'   # ou si les dépendances changent
  workflow_dispatch:

# ── JOBS ─────────────────────────────────────────────────────
jobs:

  build-and-push:
    name: Build + Push Docker image
    runs-on: ubuntu-latest

    steps:

      # 1. Cloner le dépôt
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Extraire les métadonnées pour les tags de l'image
      # Génère automatiquement : latest, sha-abc1234, etc.
      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devops-cicd-labs
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # 3. Se connecter à Docker Hub avec les secrets
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Configurer BuildKit (builder Docker avancé, plus rapide)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build et push en une seule étape
      # --cache-from/to : réutilise les layers entre les runs
      - name: Build et push l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha          # cache GitHub Actions
          cache-to: type=gha,mode=max

      # 6. Résumé du push
      - name: Résumé
        run: |
          echo "🐳 Image poussée sur Docker Hub"
          echo "📦 Tags : ${{ steps.meta.outputs.tags }}"
          echo "🔀 Commit : ${{ github.sha }}"